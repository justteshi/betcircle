        how_to_play_hero_title_before: Как
        how_to_play_hero_title_highlight: работи
        how_to_play_hero_title_after: BetCircle на ясен език.
        how_to_play_hero_lead: Избери игрова седмица, използвай токени за участие, изпрати прогнозите си преди заключването и следи как се представят изборите ти след края на мачовете.
        how_to_play_short_version: Накратко
        how_to_play_panel_title: Избери седмица. Включи се. Прогнозирай резултатите.
        how_to_play_panel_text: Платформата е изградена така, че този процес да е ясен, бърз и лесен дори ако използваш BetCircle за първи път.
        how_to_play_flow_title: Как протича играта стъпка по стъпка
        how_to_play_flow_subtitle: Всичко, което трябва да знаеш преди първото си участие.
        how_to_play_step_1_title: Създай своя акаунт
        how_to_play_step_1_text: Регистрирай се или влез, за да бъдат участията, портфейлът и прогнозите ти свързани с профила ти.
        how_to_play_step_2_title: Зареди токени
        how_to_play_step_2_text: Купи пакети с токени и поддържай портфейла си зареден, за да можеш да се включваш в желаните игрови седмици.
        how_to_play_step_3_title: Избери игрова седмица
        how_to_play_step_3_text: Отвори активна игрова седмица и провери входната цена, крайния срок, броя срещи и наградния фонд за този кръг.
        how_to_play_step_4_title: Включи се преди крайния срок
        how_to_play_step_4_text: Използвай нужните токени, за да си гарантираш участие преди затварянето на прозореца за включване.
        how_to_play_step_5_title: Прогнозирай всички резултати
        how_to_play_step_5_text: Въведи очаквания от теб резултат за домакин и гост във всяка среща и запази прогнозите си преди заключването.
        how_to_play_step_6_title: Следи резултатите си
        how_to_play_step_6_text: Върни се след началото на мачовете, за да видиш прогнозите си, класирането, наградите и да се подготвиш за следващия кръг.
        how_to_play_prizes_title: Как работят наградните фондове
        how_to_play_prizes_subtitle: Платформата показва както седмични, така и сезонни награди, за да разбираш структурата на наградите преди участие.
        how_to_play_prize_1_title: Всяка седмица може да има собствен фонд
        how_to_play_prize_1_text: Преди да се включиш, провери седмичния фонд, сезонния принос и цената в токени за тази игрова седмица.
        how_to_play_prize_index_1: Награда 01
        how_to_play_prize_2_title: Сезонните награди се натрупват с времето
        how_to_play_prize_2_text: Част от всяка игрова седмица може да захранва сезонна наградна структура, което означава, че представянето в няколко кръга също има значение.
        how_to_play_prize_index_2: Награда 02
        how_to_play_prize_3_title: Резултатите определят наградите
        how_to_play_prize_3_text: След като мачовете приключат и класирането бъде изчислено, наградите зависят от това колко добре са се представили прогнозите ти спрямо останалите участници.
        how_to_play_prize_index_3: Награда 03
        how_to_play_prize_4_title: Наградите се отчитат в токени
        how_to_play_prize_4_text: Спечелените награди се кредитират през модела на портфейла, така че балансът ти отразява спечелените токени.
        how_to_play_prize_index_4: Награда 04
        how_to_play_helpful_notes: Полезни бележки
        how_to_play_notes_title: Най-важното, което трябва да знаеш.
        how_to_play_notes_subtitle: Това са детайлите, които обикновено отговарят на първите въпроси на потребителите.
        how_to_play_keep_in_mind: Имай предвид
        how_to_play_spotlight_title: Крайните срокове са най-важни.
        how_to_play_spotlight_text: Ако седмицата е заключена, можеш да я разглеждаш, но не трябва да очакваш да се включиш или да променяш прогнозите си след изтичане на срока.
        how_to_play_card_entry_kicker: Участие
        how_to_play_card_entry_title: Токените са начинът за участие
        how_to_play_card_entry_text: Използваш токени от портфейла си, за да се включиш в избраната седмица. Не е нужен отделен платежен процес, ако портфейлът ти е зареден.
        how_to_play_card_predictions_kicker: Прогнози
        how_to_play_card_predictions_title: Запази преди заключване
        how_to_play_card_predictions_text: Прогнозите ти се зачитат само ако са изпратени преди заключването на прогнозите за съответната игрова седмица.
        how_to_play_card_account_kicker: Акаунт
        how_to_play_card_account_title: Използвай секцията на акаунта
        how_to_play_card_account_text: Портфейлът, историята на поръчките и настройките на профила ти са в Моят акаунт.
        how_to_play_card_game_flow_kicker: Игрови поток
        how_to_play_card_game_flow_title: Една седмица наведнъж
        how_to_play_card_game_flow_text: Всяка игрова седмица има свои срещи, време и изисквания, затова винаги преглеждай текущия кръг първо.
        how_to_play_card_prizes_kicker: Награди
        how_to_play_card_prizes_title: Провери фонда преди участие
        how_to_play_card_prizes_text: Детайлите за седмичния и сезонния фонд ти помагат да разбереш за какво играеш, преди да използваш токени.
        how_to_play_card_seasonal_kicker: Сезонни
        how_to_play_card_seasonal_title: Някои награди са дългосрочни
        how_to_play_card_seasonal_text: Сезонните награди отличават по-силното представяне в по-дълъг период и допълват седмичния фонд, а не го заменят.
        how_to_play_card_withdrawals_kicker: Тегления
        how_to_play_card_withdrawals_title: Балансът от токени може да участва в изплащане
        how_to_play_card_withdrawals_text: Ако теглене или конвертиране към изплащане е активирано в платформата, портфейлът е мястото, където да видиш какво е начислено и какво може да премине към cash-out процес.
