        how_to_play: How To Play
        how_to_play_eyebrow: Quick guide · football predictions · tokens
        how_to_play_hero_title_before: How BetCircle
        how_to_play_hero_title_highlight: works
        how_to_play_hero_title_after: in plain language.
        how_to_play_hero_lead: Join a game week, spend tokens to enter, submit your score predictions before the lock time, and track how your picks perform as the fixtures finish.
        how_to_play_short_version: The short version
        how_to_play_panel_title: Pick a week. Join it. Predict the scores.
        how_to_play_panel_text: The product is built to keep that flow clear, fast, and easy to follow even if it is your first time using the platform.
        how_to_play_flow_title: The flow step by step
        how_to_play_flow_subtitle: Everything you need to know before you place your first entry.
        how_to_play_step_1_title: Create your account
        how_to_play_step_1_text: Register or sign in so your entries, wallet balance, and predictions are tied to your profile.
        how_to_play_step_2_title: Top up tokens
        how_to_play_step_2_text: Buy token packs and keep your wallet funded so you can enter the game weeks you want to play.
        how_to_play_step_3_title: Choose a game week
        how_to_play_step_3_text: Open an active game week and check the entry fee, deadline, number of fixtures, and the prize pool attached to that round.
        how_to_play_step_4_title: Join before the deadline
        how_to_play_step_4_text: Spend the required tokens to secure your place before the join window closes.
        how_to_play_step_5_title: Predict every score
        how_to_play_step_5_text: Enter the home and away score you expect for each fixture, then save your predictions before the lock time.
        how_to_play_step_6_title: Track your results
        how_to_play_step_6_text: Come back after kickoff to review your picks, see standings, understand prize outcomes, and prepare for the next round.
        how_to_play_prizes_title: How pool prizes work
        how_to_play_prizes_subtitle: The platform shows both weekly and seasonal prize information so you can understand the reward structure before you join.
        how_to_play_prize_1_title: Each week can have its own pool
        how_to_play_prize_1_text: Before you enter, review the weekly pool, the seasonal contribution, and the token cost of joining that game week.
        how_to_play_prize_index_1: Prize 01
        how_to_play_prize_2_title: Seasonal prizes build over time
        how_to_play_prize_2_text: Part of a game week can feed a season-long prize structure, which means performance across multiple rounds can matter, not just one week in isolation.
        how_to_play_prize_index_2: Prize 02
        how_to_play_prize_3_title: Results drive the payout outcome
        how_to_play_prize_3_text: When fixtures finish and standings are calculated, the prize distribution is based on how your predictions performed against the rest of the field.
        how_to_play_prize_index_3: Prize 03
        how_to_play_prize_4_title: Prize value is tracked in tokens
        how_to_play_prize_4_text: Winning outcomes are credited back through the wallet model, so your balance reflects the prize tokens earned from a successful week.
        how_to_play_prize_index_4: Prize 04
        how_to_play_helpful_notes: Helpful notes
        how_to_play_notes_title: What matters most when you play.
        how_to_play_notes_subtitle: These are the details that usually answer the first questions a user has.
        how_to_play_keep_in_mind: Keep in mind
        how_to_play_spotlight_title: Deadlines matter more than anything else.
        how_to_play_spotlight_text: If a week is locked, you can still review it, but you should not expect to join or change predictions after the lock window has passed.
        how_to_play_card_entry_kicker: Entry
        how_to_play_card_entry_title: Tokens are your entry method
        how_to_play_card_entry_text: You use wallet tokens to enter the selected week. No separate payment flow is needed once your wallet is funded.
        how_to_play_card_predictions_kicker: Predictions
        how_to_play_card_predictions_title: Save before lock
        how_to_play_card_predictions_text: Your predictions only count if they are submitted before the prediction lock for that game week.
        how_to_play_card_account_kicker: Account
        how_to_play_card_account_title: Use the account area
        how_to_play_card_account_text: Your wallet, order history, and profile settings all live under My Account.
        how_to_play_card_game_flow_kicker: Game flow
        how_to_play_card_game_flow_title: One week at a time
        how_to_play_card_game_flow_text: Each game week has its own fixtures, timing, and entry requirements, so always review the current round first.
        how_to_play_card_prizes_kicker: Prizes
        how_to_play_card_prizes_title: Check the pool before joining
        how_to_play_card_prizes_text: The weekly and seasonal pool details help you understand what you are playing for before you commit tokens.
        how_to_play_card_seasonal_kicker: Seasonal
        how_to_play_card_seasonal_title: Some rewards are bigger-picture prizes
        how_to_play_card_seasonal_text: Seasonal prizes are meant to reward stronger performance across a longer stretch, so they complement the week-by-week pool rather than replace it.
        how_to_play_card_withdrawals_kicker: Withdrawals
        how_to_play_card_withdrawals_title: Token balance can be part of payout flow
        how_to_play_card_withdrawals_text: If withdrawal or payout conversion is enabled on the platform, the wallet balance is the place to review what has been credited and what can move into a cash-out process.
